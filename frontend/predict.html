<!DOCTYPE html>
<html lang="en">
<head>
    <title>Predict</title>
    <!--===============================================================================================-->   
    <link rel="icon" type="image/png" href="images/icons/favicon.ico"/>
    <!--===============================================================================================-->
    <link rel="stylesheet" type="text/css" href="vendor/bootstrap/css/bootstrap.min.css">
    <!--===============================================================================================-->
    <link rel="stylesheet" type="text/css" href="fonts/font-awesome-4.7.0/css/font-awesome.min.css">
    <!--===============================================================================================-->
    <link rel="stylesheet" type="text/css" href="vendor/animate/animate.css">
    <!--===============================================================================================-->   
    <link rel="stylesheet" type="text/css" href="vendor/css-hamburgers/hamburgers.min.css">
    <!--===============================================================================================-->
    <link rel="stylesheet" type="text/css" href="vendor/animsition/css/animsition.min.css">
    <!--===============================================================================================-->
    <link rel="stylesheet" type="text/css" href="vendor/select2/select2.min.css">
    <!--===============================================================================================-->   
    <link rel="stylesheet" type="text/css" href="vendor/daterangepicker/daterangepicker.css">
    <!--===============================================================================================-->
    <link rel="stylesheet" type="text/css" href="css/util.css">
    <link rel="stylesheet" type="text/css" href="css/main.css">
    <!--===============================================================================================-->
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
        }

        .limiter {
            width: 100%;
            margin: 0 auto;
        }

        .container-login100 {
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            padding: 15px;
            
        }

        .wrap-login100 {
            width: 100%;
            background:rgb(141, 167, 120);              /*CHOOSE FILE BACKGROUND*/
            border-radius: 10px;
            overflow: visible;
            padding: 77px 55px 33px 55px;
            box-shadow: 0 5px 10px 0px rgba(0, 0, 0, 0.1);
        }

        .wrap-login100-form-btn {
            width: 100%;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            padding-top: 13px;
        }

        .login100-form-btn {
            font-family: Arial, sans-serif;
            font-size: 15px;
            color: #fff;
            line-height: 1.2;
            text-transform: uppercase;
            background: #333;
            padding: 15px 35px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.4s ease;
        }

        .login100-form-btn:hover {
            background: #555;
        }

        .login100-form-title {
            font-family: Arial, sans-serif;
            font-size: 24px;
            color: #333;
            line-height: 1.2;
            text-align: center;
            margin-bottom: 35px;
        }

        #image-container {
            text-align: center;
            margin-top: 20px;
        }

        #uploaded-image {
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="limiter">
        <div class="container-login100"> 
            
            <img class="back-image">
            <source src="E:\cottonleafprediction\dataset\imgs\Healthy\vertical_flip12.jpg"> 
          
            <div class="wrap-login100">
                <form id="upload-form" enctype="multipart/form-data">
                    <span class="login100-form-title" style="color: white; font-weight: bold;"> COTTON PLANT LEAF DISEASE DETECTION <BR/> 
                        Upload Image</span>
                    <input type="file" name="image" id="image">
                </form>
                <div id="image-container" style="display:none;">
                    <img id="uploaded-image" src="#" alt="Uploaded Image" width="300">
                </div>
                <div class="wrap-login100-form-btn">
                    <button type="button" id="predict-btn" class="login100-form-btn" style="display:none;">Predict</button>
                </div>
                <div id="prediction" style="color: rgb(11, 17, 4)  ;"  ></div>
                <div id="percentage"></div>
		<div id="health-status"></div>

                <div id="loader"></div>
            </div>
        </div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
    document.getElementById('predict-btn').addEventListener('click', function () {
        var formData = new FormData();
        formData.append('image', document.getElementById('image').files[0]);

        // Display loader
        document.getElementById('loader').style.display = 'block';

        fetch('http://127.0.0.1:5000/predict', {
            method: 'POST',
            body: formData
        })
        .then(response => response.json())
        .then(data => {
            // Hide loader when request is complete
            document.getElementById('loader').style.display = 'none';
            document.getElementById('prediction').innerText = 'Predicted class: '+ data.prediction;
            document.getElementById('percentage').innerText = 'Percentage: ' + Math.round(data.percentage * 100) + '%';
	   document.getElementById('health-status').innerText = 'Health status: ' + data.health_status;
        })
        .catch(error => {
            // Hide loader if there's an error
            document.getElementById('loader').style.display = 'none';
            console.error('Error:', error);
        });
    });

    document.getElementById('image').addEventListener('change', function () {
        var reader = new FileReader();
        reader.onload = function (e) {
            document.getElementById('uploaded-image').src = e.target.result;
            document.getElementById('image-container').style.display = 'block';
            document.getElementById('predict-btn').style.display = 'block';
            document.getElementById('prediction').innerText = '';
            document.getElementById('percentage').innerText = '';
	    document.getElementById('health-status').innerText = '';
        }
        reader.readAsDataURL(this.files[0]);
    });
});
    </script>
</body>
</html>
